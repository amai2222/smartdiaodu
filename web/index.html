<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0c0f" />
  <title>顺风车调度 · 控制台</title>
  <script src="config.js"></script>
  <script src="console-filter.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { panel: '#14151a', border: '#2a2d35', muted: '#8b9199', accent: '#3b82f6', success: '#22c55e', danger: '#ef4444' },
          fontSize: { 'console': ['1.125rem', { lineHeight: '1.5' }], 'big': ['1.35rem', { lineHeight: '1.4' }], 'hero': ['1.6rem', { lineHeight: '1.3' }] },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="index.css" />
  <link rel="preload" href="setup.html" as="document" />
</head>
<body class="bg-[#0c0c0f] text-gray-100 min-h-screen font-sans antialiased">
  <div id="appShell" class="flex flex-col min-h-screen max-w-lg mx-auto">
    <!-- 顶部状态栏（仅首页显示） -->
    <header id="appHeader" class="flex items-center justify-between py-3 px-4 flex-shrink-0 border-b border-border">
      <div class="flex items-center gap-2">
        <span class="w-2.5 h-2.5 rounded-full bg-success animate-pulse" aria-hidden="true"></span>
        <span class="text-sm text-muted">AI 大脑在线</span>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm text-muted">空座</span>
        <select id="emptySeats" class="bg-panel border border-border rounded-xl px-3 py-2 text-base text-gray-100 focus:ring-2 focus:ring-accent">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </div>
    </header>
    <div id="appHeaderExtra" class="flex justify-end items-center gap-2 px-4 py-1 border-b border-border/50">
      <span id="userName" class="text-sm text-muted"></span>
      <button type="button" id="btnLogout" class="text-sm text-muted hover:text-gray-100 underline">退出</button>
    </div>

    <!-- 主内容区：首页 / 地图 切换 -->
    <main id="appMain" class="flex-1 overflow-auto pb-20">
      <div id="viewHome" class="app-view px-4 pt-2">
    <!-- ========== 区块一：实时雷达与我的车厢 ========== -->
    <section id="driverLocCard" class="driver-loc-card bg-panel border border-border rounded-2xl p-4 mb-5 shadow-xl">
      <h2 class="driver-loc-card__title text-muted font-medium mb-2 flex items-center gap-2">
        <span aria-hidden="true">📍</span> 我的位置
      </h2>
      <input type="text" id="driverLoc" readonly
        class="driver-loc-card__input w-full bg-[#0c0c0f] border border-border rounded-xl px-3 py-2.5 text-gray-100 placeholder-gray-500"
        placeholder="地址" />
      <div class="flex gap-2 items-center flex-wrap mt-2">
        <button type="button" id="btnEditDriverLoc" class="btn-touch shrink-0 px-3 py-2 rounded-xl border border-border text-muted hover:text-accent hover:border-accent/60 font-medium" title="编辑我的位置">✏️ 编辑</button>
        <button type="button" id="btnRefreshGps" class="btn-touch shrink-0 bg-accent hover:bg-blue-600 text-white font-medium rounded-xl px-3 py-2 flex items-center gap-1.5">
          <span aria-hidden="true">🎯</span>
          <span>刷新 GPS</span>
        </button>
        <button type="button" id="btnShareLoc" class="btn-touch shrink-0 px-3 py-2 rounded-xl border border-border text-muted hover:text-accent hover:border-accent/60 font-medium flex items-center gap-1.5" title="分享当前地址和 GPS">📤 分享</button>
      </div>
      <p id="gpsStatus" class="driver-loc-card__status text-muted mt-1.5"></p>

      <div id="restrictionHintIndex" class="hidden mt-3 p-3 rounded-xl bg-amber-900/40 border border-amber-600/50 text-amber-200 text-sm" role="alert"></div>

    <!-- 编辑我的位置弹窗：输入框 + 麦克风（点击使用，再次点击取消监听）+ 保留并写库 -->
    <div id="driverLocEditModalOverlay" class="driver-loc-edit-overlay fixed inset-0 bg-black/60 z-[2000] items-center justify-center p-4" aria-hidden="true" style="display: none;">
      <div id="driverLocEditModal" class="bg-panel border border-border rounded-xl max-w-md w-full shadow-xl" role="dialog" aria-labelledby="driverLocEditModalTitle">
        <h3 id="driverLocEditModalTitle" class="text-console text-muted font-medium px-5 pt-4 pb-2 border-b border-border">编辑我的位置</h3>
        <div class="p-5">
          <label for="driverLocEditInput" class="block text-muted text-sm mb-2">地址</label>
          <div class="flex gap-2 items-center mb-4">
            <input type="text" id="driverLocEditInput" placeholder="输入或点🎤语音输入" class="flex-1 min-w-0 px-3 py-2.5 rounded-xl bg-[#0c0c0f] border border-border text-gray-100 placeholder-gray-500" />
            <button type="button" id="driverLocEditVoiceBtn" class="voice-btn shrink-0 px-3 py-2.5 rounded-xl border border-border text-muted hover:text-accent hover:border-accent/60" title="语音输入">🎤</button>
          </div>
          <div class="flex gap-3">
            <button type="button" id="driverLocEditCancel" class="flex-1 py-2.5 rounded-xl border border-border text-muted font-medium">取消</button>
            <button type="button" id="driverLocEditSave" class="flex-1 py-2.5 rounded-xl bg-accent text-white font-medium">保留并写库</button>
          </div>
        </div>
      </div>
    </div>

      <div id="passengerCardSection" class="mt-5">
        <div id="passengerSectionHeader" class="flex items-center justify-between mb-3 flex-wrap gap-2 cursor-pointer select-none" role="button" tabindex="0" aria-expanded="false" aria-controls="passengerSectionBody" title="点击展开/收起车上乘客">
          <h3 class="text-muted text-console font-medium flex items-center gap-2">
            <span aria-hidden="true">👥</span> 当前车上乘客
            <span id="passengerChevron" class="text-xs text-muted" aria-hidden="true">▼</span>
          </h3>
          <button type="button" id="btnShowPlan" class="btn-touch px-4 py-2 rounded-xl border border-accent text-accent text-sm font-medium hover:bg-accent/20" onclick="event.stopPropagation();">查看当前计划</button>
        </div>
        <div id="passengerSectionBody" class="hidden">
          <ul id="passengerList" class="space-y-3">
            <!-- 动态插入：每行 [ 1号客 ] 起点 → 终点 (状态) [ ✖️ 下车 ] -->
          </ul>
          <p id="noPassengersHint" class="text-muted text-console py-2">暂无乘客，抢到单后点下方「添加至我的车厢」</p>
          <div id="passengerDiagnostic" class="hidden mt-3 p-3 rounded-xl bg-[#0c0c0f] border border-border text-sm text-muted"></div>
        </div>
      </div>

      <!-- 入口主操作：途经点、继续接单（地图用底部导航「地图」） -->
      <div id="entryActions" class="mt-6 flex flex-col gap-3">
        <button type="button" id="btnWaypoints" class="w-full py-3 rounded-xl border border-accent/60 text-accent font-medium text-center text-big hover:bg-accent/20">
          📍 途经点
        </button>
        <button type="button" id="btnContinueMatch" class="hidden w-full py-4 rounded-xl border-2 border-success text-success font-medium text-big">
          💺 继续接单
        </button>
        <p id="entryHint" class="text-sm text-muted text-center"></p>
      </div>
    </section>

    <!-- 当前计划弹窗：各乘客起点、终点 -->
    <div id="planModalOverlay" aria-hidden="true">
      <div id="planModal" role="dialog" aria-labelledby="planModalTitle">
        <h3 id="planModalTitle">当前计划 · 各乘客起点与终点</h3>
        <div id="planModalContent"></div>
        <button type="button" id="planModalClose">关闭</button>
      </div>
    </div>

    <!-- 途经点弹窗：查看与添加途经点 -->
    <div id="waypointsModalOverlay" aria-hidden="true">
      <div id="waypointsModal" role="dialog" aria-labelledby="waypointsModalTitle">
        <h3 id="waypointsModalTitle">途经点</h3>
        <div id="waypointsModalContent"></div>
        <div class="waypoint-add-row flex gap-2 mt-3 flex-wrap items-center">
          <input type="text" id="waypointAddrInput" placeholder="输入或语音说地址添加途经点" class="flex-1 min-w-0 px-3 py-2 rounded-lg bg-[#0c0c0f] border border-border text-console" />
          <button type="button" id="waypointVoiceBtn" class="voice-btn shrink-0 px-3 py-2 rounded-lg border border-border text-muted hover:text-accent hover:border-accent/60" title="点击说话，语音输入地址；监听中再点取消">🎤</button>
          <button type="button" id="waypointAddBtn" class="shrink-0 px-4 py-2 rounded-lg bg-accent text-white font-medium">添加</button>
        </div>
        <button type="button" id="waypointsModalClose" class="mt-3 w-full py-2 rounded-lg border border-border text-muted">关闭</button>
      </div>
    </div>

    <!-- 编辑乘客起终点弹窗：默认原地址，可修改后写回 order_pool -->
    <div id="editPassengerModalOverlay" aria-hidden="true">
      <div id="editPassengerModal" role="dialog" aria-labelledby="editPassengerModalTitle">
        <h3 id="editPassengerModalTitle">编辑乘客起终点</h3>
        <div class="edit-body">
          <div class="flex items-center gap-2 mb-3">
            <button type="button" id="editVoiceStartEndBtn" class="voice-start-end-btn px-3 py-2 rounded-lg border border-accent/60 text-accent text-sm font-medium hover:bg-accent/20" title="说：乘客x起点：xxx，终点：xxx">🎤 一句说清起终点</button>
            <span class="text-muted text-xs">说：乘客x起点：xxx，终点：xxx</span>
          </div>
          <label for="editPickup">接 / 起点</label>
          <div class="input-with-voice flex gap-1 mb-2">
            <input type="text" id="editPickup" placeholder="接客地址（可点🎤语音输入）" class="flex-1" />
            <button type="button" id="editPickupVoiceBtn" class="voice-btn shrink-0" title="语音输入">🎤</button>
          </div>
          <label for="editDelivery">送 / 终点</label>
          <div class="input-with-voice flex gap-1">
            <input type="text" id="editDelivery" placeholder="送达地址（可点🎤语音输入）" class="flex-1" />
            <button type="button" id="editDeliveryVoiceBtn" class="voice-btn shrink-0" title="语音输入">🎤</button>
          </div>
        </div>
        <div class="edit-actions">
          <button type="button" id="editPassengerModalCancel">取消</button>
          <button type="button" id="editPassengerModalSave">保存并写库</button>
        </div>
      </div>
    </div>

    <!-- ========== 区块三：战利品展示区 ========== -->
    <section class="bg-panel border border-border rounded-2xl p-5 mb-5 shadow-xl">
      <h2 class="text-muted text-console font-medium mb-3 flex items-center gap-2">
        <span aria-hidden="true">💸</span> 顺路单（抢到后点添加）
      </h2>
      <p id="pushEventsStatus" class="text-sm text-muted mb-3">未连接推送时仅 Bark 提醒；配置 Supabase 后此处实时显示。</p>
      <ul id="pushEventsList" class="space-y-4 max-h-[50vh] overflow-y-auto">
        <!-- Realtime 推送的卡片动态插入 -->
      </ul>
    </section>

      </div>
      <!-- 地图视图：本页内嵌 map.html -->
      <div id="viewMap" class="app-view hidden">
        <iframe id="mapFrame" src="about:blank" class="w-full h-full border-0 block" title="路线地图"></iframe>
      </div>
      <!-- 计划视图：预期计划列表，点击显示明细 -->
      <div id="viewPlans" class="app-view hidden overflow-auto">
        <div class="px-4 pt-4 pb-6">
          <h2 class="text-muted font-medium mb-3 flex items-center gap-2">
            <span aria-hidden="true">📋</span> 预期计划
          </h2>
          <p class="text-xs text-muted mb-2">当前计划（各乘客起点、终点、途经点）在<strong>首页</strong>点击「查看当前计划」查看；本页为<strong>预期计划</strong>（到点找单的线路），暂无乘客。</p>
          <p class="text-xs text-muted mb-2">以下为全部预期计划，点击任一条可查看详情。</p>
          <p id="plansListStatus" class="text-sm text-muted mb-3">加载中…</p>
          <div id="plansListRoot" class="space-y-3"></div>
        </div>
        <div id="planDetailOverlay" class="fixed inset-0 bg-black/60 z-[2000] flex items-center justify-center p-4 pb-safe" style="display: none;" aria-hidden="true">
          <div id="planDetailPanel" class="bg-panel border border-border rounded-xl max-w-md w-full shadow-xl p-5" role="dialog" aria-labelledby="planDetailTitle">
            <h3 id="planDetailTitle" class="text-console font-medium text-muted mb-4 border-b border-border pb-2">计划明细</h3>
            <div id="planDetailContent" class="space-y-3 text-sm"></div>
            <button type="button" id="planDetailClose" class="mt-4 w-full py-2.5 rounded-xl border border-border text-muted font-medium">关闭</button>
          </div>
        </div>
      </div>
      <!-- 设置视图：内嵌 setup.html，预加载后点击即显，避免整页跳转卡顿 -->
      <div id="viewSetup" class="app-view hidden">
        <iframe id="setupFrame" src="about:blank" class="w-full h-full min-h-[60vh] border-0 block" title="设置"></iframe>
      </div>
    </main>

    <!-- 底部导航栏（App 风格） -->
    <nav id="bottomNav" class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto flex items-stretch bg-panel border-t border-border z-1000 pb-safe">
      <button type="button" id="navHome" class="nav-tab active flex-1 py-3 flex flex-col items-center gap-1 border-t-2 bg-panel">
        <span class="text-lg">🏠</span>
        <span class="text-xs font-medium">首页</span>
      </button>
      <button type="button" id="navMap" class="nav-tab flex-1 py-3 flex flex-col items-center gap-1 border-t-2 border-transparent bg-panel">
        <span class="text-lg">🗺️</span>
        <span class="text-xs font-medium">地图</span>
      </button>
      <button type="button" id="navPlans" class="nav-tab flex-1 py-3 flex flex-col items-center gap-1 border-t-2 border-transparent bg-panel text-gray-100">
        <span class="text-lg">📋</span>
        <span class="text-xs font-medium">计划</span>
      </button>
      <button type="button" id="navSettings" class="nav-tab flex-1 py-3 flex flex-col items-center gap-1 border-t-2 border-transparent bg-panel text-gray-100">
        <span class="text-lg">⚙️</span>
        <span class="text-xs font-medium">设置</span>
      </button>
    </nav>
  </div>

  <script>
(function () {
  function setupNav() {
    var viewHome = document.getElementById("viewHome");
    var viewMap = document.getElementById("viewMap");
    var viewPlans = document.getElementById("viewPlans");
    var viewSetup = document.getElementById("viewSetup");
    var navHome = document.getElementById("navHome");
    var navMap = document.getElementById("navMap");
    var navPlans = document.getElementById("navPlans");
    var navSettings = document.getElementById("navSettings");
    var bottomNav = document.getElementById("bottomNav");
    var appMain = document.getElementById("appMain");
    var appHeader = document.getElementById("appHeader");
    var appHeaderExtra = document.getElementById("appHeaderExtra");
    var mapFrame = document.getElementById("mapFrame");
    var setupFrame = document.getElementById("setupFrame");
    if (!viewHome || !viewMap || !navHome || !navMap) return;
    function addTap(el, fn) {
      if (!el) return;
      el.addEventListener("click", fn);
      el.addEventListener("touchend", function (e) { e.preventDefault(); fn(); }, { passive: false });
    }
    function setActive(tab) {
      [navHome, navMap, navPlans, navSettings].forEach(function (n) { if (n) n.classList.toggle("active", n === tab); });
    }
    function showHome() {
      viewHome.classList.remove("hidden");
      viewMap.classList.add("hidden");
      if (viewPlans) viewPlans.classList.add("hidden");
      if (viewSetup) viewSetup.classList.add("hidden");
      if (bottomNav) bottomNav.classList.remove("bottom-nav-hidden");
      if (appMain) appMain.classList.remove("map-fullscreen");
      if (appHeader) appHeader.classList.remove("app-header-hidden");
      if (appHeaderExtra) appHeaderExtra.classList.remove("app-header-hidden");
      setActive(navHome);
    }
    var mapLoaded = false;
    function showMap() {
      if (mapFrame && !mapLoaded) { mapFrame.src = "map.html"; mapLoaded = true; }
      viewHome.classList.add("hidden");
      viewMap.classList.remove("hidden");
      if (viewPlans) viewPlans.classList.add("hidden");
      if (viewSetup) viewSetup.classList.add("hidden");
      if (bottomNav) bottomNav.classList.add("bottom-nav-hidden");
      if (appMain) appMain.classList.add("map-fullscreen");
      if (appHeader) appHeader.classList.add("app-header-hidden");
      if (appHeaderExtra) appHeaderExtra.classList.add("app-header-hidden");
      setActive(navMap);
    }
    function showPlans() {
      viewHome.classList.add("hidden");
      viewMap.classList.add("hidden");
      if (viewPlans) viewPlans.classList.remove("hidden");
      if (viewSetup) viewSetup.classList.add("hidden");
      if (bottomNav) bottomNav.classList.remove("bottom-nav-hidden");
      if (appMain) appMain.classList.remove("map-fullscreen");
      if (appHeader) appHeader.classList.remove("app-header-hidden");
      if (appHeaderExtra) appHeaderExtra.classList.remove("app-header-hidden");
      setActive(navPlans);
      loadPlansList();
    }
    function loadPlansList() {
      var root = document.getElementById("plansListRoot");
      var statusEl = document.getElementById("plansListStatus");
      if (!root || !statusEl) return;
      var C = window.SmartDiaoduConsole;
      var base = C && C.getApiBase ? C.getApiBase() : "";
      var driverId = C && C.getDriverId ? C.getDriverId() : "";
      var q = driverId ? "?driver_id=" + encodeURIComponent(driverId) : "";
      root.innerHTML = "";
      if (!base) {
        statusEl.textContent = "未配置后端，无法加载计划";
        return;
      }
      statusEl.textContent = "加载中…";
      fetch(base + "/planned_trip" + q).then(function (r) { return r.json(); }).then(function (d) {
        var plans = (d && d.plans) ? d.plans : [];
        plans.sort(function (a, b) {
          var t1 = a.departure_time || "";
          var t2 = b.departure_time || "";
          return t1 < t2 ? -1 : t1 > t2 ? 1 : 0;
        });
        var currentDep = null;
        plans.forEach(function (p) {
          if (!p.completed && p.departure_time) {
            if (currentDep === null || p.departure_time < currentDep) currentDep = p.departure_time;
          }
        });
        function planTimeWithDate(t) {
          if (!t || !t.trim()) return "—";
          if (/^\d{4}-\d{1,2}-\d{1,2}/.test(t.trim())) return t.trim();
          var d = new Date();
          var dateStr = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
          return dateStr + " " + t.trim();
        }
        statusEl.textContent = "共 " + plans.length + " 条计划，点击可查看详情";
        plans.forEach(function (p, idx) {
          var isCurrent = !p.completed && currentDep !== null && p.departure_time === currentDep;
          var timeStr = planTimeWithDate(p.departure_time);
          var card = document.createElement("button");
          card.type = "button";
          card.className = "w-full text-left py-3 px-4 rounded-xl bg-panel border text-gray-100 hover:border-accent/60 transition-colors " + (isCurrent ? "border-accent ring-1 ring-accent/30" : "border-border");
          card.innerHTML = (isCurrent ? "<span class=\"text-xs text-accent font-medium mb-1 block\">当前预期计划</span>" : "") +
            "<span class=\"font-medium\">" + (p.origin || "—") + " → " + (p.destination || "—") + "</span><br><span class=\"text-sm text-muted\">" + timeStr + (p.completed ? " <span class=\"text-muted\">已完成</span>" : "") + "</span>";
          card.dataset.index = String(idx);
          card.addEventListener("click", function () { showPlanDetail(p); });
          root.appendChild(card);
        });
      }).catch(function () {
        statusEl.textContent = "加载失败";
        root.innerHTML = "";
      });
    }
    function showPlanDetail(p) {
      var overlay = document.getElementById("planDetailOverlay");
      var content = document.getElementById("planDetailContent");
      if (!overlay || !content) return;
      var depTime = (p.departure_time || "").trim();
      var depTimeStr = depTime ? (/^\d{4}-\d{1,2}-\d{1,2}/.test(depTime) ? depTime : (function () { var d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0") + " " + depTime; }())) : "—";
      content.innerHTML =
        "<div class=\"flex justify-between\"><span class=\"text-muted\">起点</span><span class=\"text-gray-100\">" + (p.origin || "—") + "</span></div>" +
        "<div class=\"flex justify-between\"><span class=\"text-muted\">终点</span><span class=\"text-gray-100\">" + (p.destination || "—") + "</span></div>" +
        "<div class=\"flex justify-between\"><span class=\"text-muted\">出发时间</span><span class=\"text-gray-100\">" + depTimeStr + "</span></div>" +
        "<div class=\"flex justify-between\"><span class=\"text-muted\">时间窗</span><span class=\"text-gray-100\">±" + (p.time_window_minutes != null ? p.time_window_minutes : 30) + " 分钟</span></div>" +
        "<div class=\"flex justify-between\"><span class=\"text-muted\">人数</span><span class=\"text-gray-100\">" + (p.min_orders != null ? p.min_orders : 2) + "～" + (p.max_orders != null ? p.max_orders : 4) + "</span></div>" +
        "<div class=\"flex justify-between\"><span class=\"text-muted\">状态</span><span class=\"text-gray-100\">" + (p.completed ? "已完成" : "未完成") + "</span></div>" +
        "<div class=\"pt-2 mt-2 border-t border-border\"><span class=\"text-muted\">乘客</span><span class=\"text-gray-100 block mt-1 text-xs\">预期计划暂无乘客；探子到点按此线路找单，有合适单会推送到首页，乘客在「首页」当前计划中查看。</span></div>";
      overlay.style.display = "flex";
      overlay.setAttribute("aria-hidden", "false");
    }
    document.getElementById("planDetailClose").addEventListener("click", function () {
      var o = document.getElementById("planDetailOverlay");
      if (o) { o.style.display = "none"; o.setAttribute("aria-hidden", "true"); }
    });
    document.getElementById("planDetailOverlay").addEventListener("click", function (e) {
      if (e.target === document.getElementById("planDetailOverlay")) {
        var o = document.getElementById("planDetailOverlay");
        if (o) { o.style.display = "none"; o.setAttribute("aria-hidden", "true"); }
      }
    });
    var setupLoaded = false;
    function showSetup() {
      if (setupFrame && !setupLoaded) { setupFrame.src = "setup.html"; setupLoaded = true; }
      viewHome.classList.add("hidden");
      viewMap.classList.add("hidden");
      if (viewPlans) viewPlans.classList.add("hidden");
      if (viewSetup) viewSetup.classList.remove("hidden");
      if (bottomNav) bottomNav.classList.remove("bottom-nav-hidden");
      if (appMain) appMain.classList.remove("map-fullscreen");
      if (appHeader) appHeader.classList.remove("app-header-hidden");
      if (appHeaderExtra) appHeaderExtra.classList.remove("app-header-hidden");
      setActive(navSettings);
    }
    addTap(navHome, showHome);
    addTap(navMap, showMap);
    addTap(navPlans, showPlans);
    addTap(navSettings, showSetup);
    var btnShowMap = document.getElementById("btnShowMap");
    if (btnShowMap) addTap(btnShowMap, showMap);
    window.addEventListener("message", function (e) {
      if (!e.data || !e.data.type) return;
      if (e.data.type === "smartdiaodu_map_back") showHome();
      if (e.data.type === "smartdiaodu_show_home") showHome();
      if (e.data.type === "smartdiaodu_show_map") showMap();
    });
    setActive(navHome);
    if (location.hash === "#map") showMap();
    else if (location.hash === "#plans") showPlans();
    else if (location.hash === "#setup") showSetup();
    if (setupFrame) setupFrame.src = "setup.html";
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", setupNav);
  else setupNav();
})();
  </script>
  <script src="vendor/supabase.js"></script>
  <script src="index-config.js"></script>
  <script src="index-state.js"></script>
  <script src="auth.js"></script>
  <script src="index-ui.js"></script>
  <!-- Realtime 推送：复用同一 Supabase 客户端，避免多实例警告 -->
  <script>
(function () {
  var C = window.SmartDiaoduConsole;
  if (!C) return;
  var sup = C.getSupabaseClient();
  if (!sup) return;
  try {
    sup.channel("push_events_channel").on("postgres_changes", { event: "INSERT", schema: "public", table: "push_events" }, function (payload) {
      if (payload && payload.new) window.dispatchEvent(new CustomEvent("smartdiaodu_push", { detail: payload.new }));
    }).subscribe(function (s) {
      var el = document.getElementById("pushEventsStatus");
      if (el) el.textContent = s === "SUBSCRIBED" ? "已连接 Realtime，等待顺路单…" : "Realtime: " + s;
    });
  } catch (e) {
    var el = document.getElementById("pushEventsStatus");
    if (el) el.textContent = "Realtime 连接失败: " + (e.message || e);
  }
})();
  </script>
